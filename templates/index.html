<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello World & Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            margin: 5px;
            padding: 5px 10px;
        }
        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- ✅ FIX 1: MUST be Hello World -->
<h1>Hello World</h1>

<h2>Calculator</h2>

<input id="a" type="number" placeholder="First number">
<input id="b" type="number" placeholder="Second number"><br>

<!-- ✅ Keep text EXACT for Playwright -->
<button id="addBtn">Add</button>
<button id="subBtn">Subtract</button>
<button id="mulBtn">Multiply</button>
<button id="divBtn">Divide</button>

<div id="result"></div>

<script>
async function calculate(operation) {
    const a = parseFloat(document.getElementById('a').value);
    const b = parseFloat(document.getElementById('b').value);
    const resultElement = document.getElementById('result');

    try {
        const response = await fetch('/' + operation, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ a: a, b: b })
        });

        const data = await response.json();

        if (response.ok) {
            resultElement.innerText = 'Result: ' + data.result;
        } else {
            resultElement.innerText = 'Error: ' + data.error;
        }

        // ✅ FIX 2: force Playwright to see update
        await new Promise(resolve => setTimeout(resolve, 150));

    } catch (error) {
        resultElement.innerText = 'Error: ' + error.message;
    }
}

/* ✅ Reliable event binding */
document.getElementById("addBtn").addEventListener("click", () => calculate("add"));
document.getElementById("subBtn").addEventListener("click", () => calculate("subtract"));
document.getElementById("mulBtn").addEventListener("click", () => calculate("multiply"));
document.getElementById("divBtn").addEventListener("click", () => calculate("divide"));
</script>

</body>
</html>
